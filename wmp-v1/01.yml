apiVersion: v1
kind: Pod
metadata:
  name: analytics-service
spec:
  containers:
    - name: analytics-service
      image: 293222827824.dkr.ecr.us-east-1.amazonaws.com/analytics-service:latest
---
apiVersion: v1
kind: Pod
metadata:
  name: auth-service
spec:
  containers:
    - name: auth-service
      image: 293222827824.dkr.ecr.us-east-1.amazonaws.com/auth-service:latest
---
apiVersion: v1
kind: Pod
metadata:
  name: frontend
spec:
  containers:
    - name: frontend
      image: 293222827824.dkr.ecr.us-east-1.amazonaws.com/frontend:latest
---
apiVersion: v1
kind: Pod
metadata:
  name: portfolio-service
spec:
  containers:
    - name: portfolio-service
      image: 293222827824.dkr.ecr.us-east-1.amazonaws.com/portfolio-service:latest
      env:
        - name: SPRING_PROFILES_ACTIVE
          value: production
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://:5432/wmp?currentSchema=portfolio_schema"
        - name: SPRING_DATASOURCE_USERNAME
          value: portfolio_svc_user
        - name: SPRING_DATASOURCE_PASSWORD
          value: localdev123
        - name: JWT_SECRET
          value: myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm
        - name: SERVER_PORT
          value: "8080"      